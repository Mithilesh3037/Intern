<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="{{ url_for('index') }}" class="brand"><i class="fa-solid fa-wallet"></i> PersonalExpenseTracker</a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}">Home</a>
                <a href="{{ url_for('add_expense') }}">Add Expense</a>
                <a href="{{ url_for('expenses') }}">Expenses</a>
                <a href="{{ url_for('summary') }}">Summary</a>
            </div>
        </div>
    </nav>

    <main class="container page">
        <section class="card form-card">
            <div class="section-title">
                <h2>Add New Expense</h2>
                <p>Fill in the details below to save your expense.</p>
            </div>

            {% if errors %}
            <div class="alert alert-danger">
                <ul>
                    {% for error in errors %}
                    <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}

            <form id="expense-form" method="post" action="{{ url_for('add_expense') }}">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="title">Expense Title</label>
                        <input type="text" id="title" name="title" required value="{{ form.title or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <input type="text" id="category" name="category" required value="{{ form.category or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" name="amount" step="0.01" min="0.01" required value="{{ form.amount or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="expense_date">Date</label>
                        <input type="date" id="expense_date" name="expense_date" required value="{{ form.expense_date or '' }}">
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4">{{ form.description or '' }}</textarea>
                </div>
                <button type="submit" class="btn btn-primary">Save Expense</button>
            </form>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
